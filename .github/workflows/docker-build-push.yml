name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_PREFIX: geliangbin7882

jobs:
  build-and-push:
    name: Build & Push All Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api
          - web
          - worker-ai
          - worker-preview
          - worker-export
          - worker-schedule

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-teacher-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=,format=short
            type=raw,value={{date 'YYYYMMDD-HHmmss' tz='Asia/Shanghai'}}

      - name: Determine Dockerfile and build args
        id: config
        run: |
          case "${{ matrix.service }}" in
            api)
              echo "dockerfile=docker/Dockerfile.api" >> $GITHUB_OUTPUT
              echo "build_args=" >> $GITHUB_OUTPUT
              ;;
            web)
              echo "dockerfile=docker/Dockerfile.web" >> $GITHUB_OUTPUT
              echo "build_args=API_URL=http://api:3000" >> $GITHUB_OUTPUT
              ;;
            worker-*)
              WORKER_NAME=$(echo "${{ matrix.service }}" | sed 's/worker-//')
              echo "dockerfile=docker/Dockerfile.worker" >> $GITHUB_OUTPUT
              echo "build_args=WORKER_NAME=${WORKER_NAME}" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.config.outputs.dockerfile }}
          build-args: ${{ steps.config.outputs.build_args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  notify:
    name: Notify Deployment Ready
    needs: build-and-push
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## 🚀 Docker Images Built & Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | \`${{ env.IMAGE_PREFIX }}/ai-teacher-api:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | \`${{ env.IMAGE_PREFIX }}/ai-teacher-web:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker-AI | \`${{ env.IMAGE_PREFIX }}/ai-teacher-worker-ai:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker-Preview | \`${{ env.IMAGE_PREFIX }}/ai-teacher-worker-preview:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker-Export | \`${{ env.IMAGE_PREFIX }}/ai-teacher-worker-export:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker-Schedule | \`${{ env.IMAGE_PREFIX }}/ai-teacher-worker-schedule:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run on server: \`docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d\`" >> $GITHUB_STEP_SUMMARY
