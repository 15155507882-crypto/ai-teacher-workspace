version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-teacher-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_teacher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-teacher-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: ai-teacher-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_teacher
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: ai-teacher-web
    ports:
      - "8080:8080"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
    depends_on:
      - api

  worker-ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER_NAME: ai
    container_name: ai-teacher-worker-ai
    environment:
      REDIS_URL: redis://redis:6379
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
    depends_on:
      redis:
        condition: service_healthy

  worker-preview:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER_NAME: preview
    container_name: ai-teacher-worker-preview
    environment:
      REDIS_URL: redis://redis:6379
      STORAGE_LOCAL_PATH: /app/storage
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage

  worker-export:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER_NAME: export
    container_name: ai-teacher-worker-export
    environment:
      REDIS_URL: redis://redis:6379
      STORAGE_LOCAL_PATH: /app/storage
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../storage:/app/storage

  worker-schedule:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
      args:
        WORKER_NAME: schedule
    container_name: ai-teacher-worker-schedule
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ai-teacher-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
